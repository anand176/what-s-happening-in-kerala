<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Circle in Brand Red -->
  <circle cx="256" cy="256" r="240" fill="#e60023" />
  
  <!-- Standalone Palm Tree and Telemetry Monitor Concept -->
  <!-- Horizontal pulse line across the bottom of the tree -->
  <path d="M 90 360 L 165 360 L 185 300 L 205 410 L 225 360 L 287 360 L 307 310 L 327 390 L 347 360 L 422 360" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="20" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Palm Tree Trunk rising from the pulse line -->
  <path d="M 256 360 L 256 190" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="24" 
        stroke-linecap="round" />

  <!-- Coconuts nestled under the leaves -->
  <circle cx="232" cy="205" r="14" fill="#ffffff" />
  <circle cx="280" cy="205" r="14" fill="#ffffff" />

  <!-- Palm Leaves curving outwards and downwards -->
  <!-- Left leaves -->
  <path d="M 256 190 Q 210 120 140 145" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" />
  <path d="M 256 190 Q 175 175 125 220" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" />
  <path d="M 256 190 Q 185 240 145 285" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" />
  
  <!-- Right leaves -->
  <path d="M 256 190 Q 302 120 372 145" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" />
  <path d="M 256 190 Q 337 175 387 220" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" />
  <path d="M 256 190 Q 327 240 367 285" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" />
</svg>
